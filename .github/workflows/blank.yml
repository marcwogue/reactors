name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout du projet
      uses: actions/checkout@v4

    - name: Configuration de Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # Configuration automatique d'une version globale de Gradle
    - name: Configuration de Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: wrapper # Utilise la version définie dans gradle-wrapper.properties

    # Compilation en utilisant la commande globale 'gradle' au lieu de './gradlew'
    - name: Compilation de l'APK avec Gradle
      run: gradle :app:assembleDebug

    - name: Sauvegarder l'APK généré
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 3
