name: Android Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Récupération du code source
    - name: Checkout du projet
      uses: actions/checkout@v4

    # 2. Configuration de l'environnement Java (requis pour Gradle et Android)
    - name: Configuration de Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle' # Active le cache pour accélérer les futures compilations

    # 3. Attribution des permissions d'exécution au wrapper Gradle
    - name: Rendre le wrapper Gradle exécutable
      run: chmod +x gradlew

    # 4. Compilation de l'application (Génération de l'APK Debug)
    - name: Compilation de l'APK avec Gradle
      run: ./gradlew assembleDebug

    # 5. Sauvegarde de l'APK généré comme artefact GitHub
    - name: Sauvegarder l'APK généré
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-day: 3
